<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">FeVOS mark</title>
  <desc id="desc">A minimal metallic Fe tile for the FeVOS project.</desc>
  <defs>
    <linearGradient id="metal" x1="18" y1="10" x2="78" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f8fa"/>
      <stop offset="0.42" stop-color="#b8bec7"/>
      <stop offset="1" stop-color="#4b5563"/>
    </linearGradient>
    <linearGradient id="edge" x1="18" y1="14" x2="78" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#202936"/>
    </linearGradient>
  </defs>
  <rect x="13" y="13" width="70" height="70" rx="15" fill="url(#edge)"/>
  <rect x="17" y="17" width="62" height="62" rx="12" fill="url(#metal)"/>
  <path d="M24 28h48" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M24 68h48" stroke="#111827" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
  <text x="48" y="58"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38"
        font-weight="700"
        fill="#111827"
        letter-spacing="-2">Fe</text>
  <rect x="18" y="17" width="60" height="62" rx="12" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.38"/>
</svg>
